# ------------------------------------------------------------------------------
# AutoFix Skeleton (Branching and Testing Only) - Option A
#
# PURPOSE:
#   Pipeline mechanics only (decoupled from fix logic):
#     1) Manual trigger with issue_number
#     2) Create a fix branch
#     3) Run build + tests + cookie policy gate
#     4) Push the branch even if the gate fails
#     5) Mark the workflow failed if the gate failed (correct CI signal)
#
# DOES NOT:
#   - modify product code
#   - commit changes
#   - create a PR
# ------------------------------------------------------------------------------

name: AutoCreateBranch

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: "GitHub Issue number (task exists already)"
        required: true
      base_branch:
        description: "Branch to branch off (usually main)"
        required: true
        default: "main"

permissions:
  contents: write

jobs:
  branch-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout base branch
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.base_branch }}
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Create fix branch (no code yet)
        run: |
          BRANCH="autofix/issue-${{ github.event.inputs.issue_number }}"
          git checkout -b "$BRANCH"
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

      - name: Run build + tests
        run: |
          dotnet restore
          dotnet build -c Release --no-restore
          dotnet test -c Release --no-build

      # IMPORTANT:
      # continue-on-error lets the workflow proceed so we can still push the branch.
      # We'll fail the workflow at the end if this step failed.
      - name: Run cookie policy gate (expected to fail)
        id: cookie_gate
        continue-on-error: true
        run: |
          chmod +x ./scripts/check_cookies.sh
          ./scripts/check_cookies.sh

      # Always push the branch, even if previous step failed.
      - name: Push branch (always)
        if: always()
        run: |
          git push -u origin "$BRANCH"

      # Ensure overall workflow is marked failed if the cookie gate failed.
      - name: Fail workflow if cookie gate failed
        if: steps.cookie_gate.outcome != 'success'
        run: |
          echo "Cookie policy gate failed. Marking workflow as FAILED."
          exit 2
