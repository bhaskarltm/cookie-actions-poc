name: AutoFix - Raise PR (Reusable)

on:
  workflow_call:
    inputs:
      issue_number:
        required: true
        type: string
      base_branch:
        required: true
        type: string
      branch_name:
        required: true
        type: string

# IMPORTANT: These permissions must also be allowed by the CALLER workflow
permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  create_pr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (for gh context)
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.base_branch }}
          fetch-depth: 1

      - name: Show token capability (debug)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Actor: ${{ github.actor }}"
          echo "Repo:  ${{ github.repository }}"
          gh auth status || true

      - name: Create PR (if not exists)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          HEAD="${{ inputs.branch_name }}"
          BASE="${{ inputs.base_branch }}"

          # If PR already exists, do not fail the workflow
          EXISTING=$(gh pr list --head "$HEAD" --base "$BASE" --json number --jq '.[0].number' || true)

          if [ -n "$EXISTING" ]; then
            echo "PR already exists: #$EXISTING"
            exit 0
          fi

          gh pr create \
            --title "AutoFix: Cookie compliance (Issue #${{ inputs.issue_number }})" \
            --body  "Automated fix applied and validated.\n\nCloses #${{ inputs.issue_number }}" \
            --base  "$BASE" \
            --head  "$HEAD"