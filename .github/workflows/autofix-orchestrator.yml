name: AutoFix Orchestrator 
on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: "GitHub Issue number (task exists already)"
        required: true
      base_branch:
        description: "Branch to branch off (usually main)"
        required: true
        default: "main"

# Optional but recommended: prevent two runs for same issue fighting each other
concurrency:
  group: autofix-issue-${{ inputs.issue_number }}
  cancel-in-progress: true

# IMPORTANT:
# The called workflows (B and C) cannot request MORE permissions than the caller.
# So this orchestrator must include the superset.
permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  prep:
    name: A) Prepare branch + run tests/gate
    runs-on: ubuntu-latest

    outputs:
      branch_name: ${{ steps.vars.outputs.branch_name }}
      gate_failed: ${{ steps.decision.outputs.gate_failed }}

    steps:
      - name: Checkout base branch
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.base_branch }}
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Define branch name
        id: vars
        run: |
          BRANCH="autofix/issue-${{ inputs.issue_number }}"
          echo "branch_name=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "BRANCH=$BRANCH" >> "$GITHUB_ENV"

      # Key fix for your non-fast-forward problem:
      # Always reset the local bot branch to latest base branch
      # and then push with --force-with-lease (safe overwrite).
      - name: Create or reset fix branch from base
        run: |
          git fetch origin "${{ inputs.base_branch }}"
          git checkout -B "$BRANCH" "origin/${{ inputs.base_branch }}"

      - name: Run build + tests
        run: |
          dotnet restore
          dotnet build -c Release --no-restore
          dotnet test -c Release --no-build

      - name: Run cookie policy gate (expected to fail pre-fix)
        id: gate
        continue-on-error: true
        run: |
          chmod +x ./scripts/check_cookies.sh
          ./scripts/check_cookies.sh

      # Always push the branch even if gate fails (your Option A),
      # and avoid non-fast-forward by using --force-with-lease.
      - name: Push branch (always)
        if: always()
        run: |
          git push -u --force-with-lease origin "$BRANCH"

      # Convert gate outcome into a clean output that downstream jobs can use
      - name: Decide next action
        id: decision
        run: |
          if [ "${{ steps.gate.outcome }}" = "success" ]; then
            echo "gate_failed=false" >> "$GITHUB_OUTPUT"
            echo "Cookie gate PASSED. No fix required."
          else
            echo "gate_failed=true" >> "$GITHUB_OUTPUT"
            echo "Cookie gate FAILED. Will call Fix+Commit workflow."
          fi

  fix:
    name: B) Fix + Commit (called workflow)
    needs: prep
    if: needs.prep.outputs.gate_failed == 'true'
    uses: ./.github/workflows/autofix-fix-commit.yml
    with:
      issue_number: ${{ inputs.issue_number }}
      base_branch: ${{ inputs.base_branch }}
      branch_name: ${{ needs.prep.outputs.branch_name }}

  pr:
    name: C) Raise PR (called workflow)
    needs: [prep, fix]
    if: needs.prep.outputs.gate_failed == 'true' && needs.fix.result == 'success'
    uses: ./.github/workflows/autofix-raise-pr.yml
    with:
      issue_number: ${{ inputs.issue_number }}
      base_branch: ${{ inputs.base_branch }}
      branch_name: ${{ needs.prep.outputs.branch_name }}